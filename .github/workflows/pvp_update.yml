name: PVPoke Daily Update

on:
  schedule:
    # UTC 01:00 = 台灣時間 09:00 (UTC+8)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 允許在 GitHub 頁面手動觸發

permissions:
  contents: write   # 允許 commit + push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install playwright pandas pyarrow

      - name: Install Playwright + Chromium
        run: playwright install --with-deps chromium

      - name: Run PVP_DL
        id: pvp
        run: |
          set +e
          python PVP_DL.py --no-git
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit and push (only when downloaded)
        if: steps.pvp.outputs.exit_code == '10'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PVPData/
          git commit -m "data: PVPData auto-update $(date -u +'%Y-%m-%d')"
          git push

      - name: Summary
        run: |
          CODE="${{ steps.pvp.outputs.exit_code }}"
          if   [ "$CODE" = "10" ]; then echo "✓ 下載並 commit 完成。"
          elif [ "$CODE" = "0"  ]; then echo "— 無新更新，跳過。"
          else                          echo "✗ 腳本失敗 (exit $CODE)。"; exit 1
          fi
