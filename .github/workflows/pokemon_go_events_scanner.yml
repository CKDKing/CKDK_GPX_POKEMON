name: 🗺️ PoGO 地區限定活動掃描

on:
  schedule:
    - cron: '0 21 * * *'   # 台灣時間 05:00 = UTC 21:00（前一天）
  workflow_dispatch:         # 允許手動觸發

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install --quiet --upgrade -r pokemon_go_events_scanner_requirements.txt

      - name: 執行掃描器
        env:
          PYTHONUTF8: "1"
        run: python -X utf8 pokemon_go_events_scanner.py

      - name: Commit & Push 結果
        shell: pwsh
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git add pokemon_go_events.json `
                  pokemon_go_events.md `
                  pokemon_go_events_scanner_log.txt

          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $ts = (Get-Date -Format "yyyy-MM-dd HH:mm")
            git commit -m "🔄 PoGO Events Scan $ts (TW)"
            git push
            Write-Host "✅ 已推送更新"
          } else {
            Write-Host "ℹ️  無變更，略過 commit"
          }
