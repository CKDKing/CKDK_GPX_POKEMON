name: IG Pokemon Scraper

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 01:00 UTC = 台灣時間 09:00
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install instaloader requests

      - name: Run scraper
        run: python Instagram_Pokemon_Scraper.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add images_ig/ Instagram_Pokemon_Scraper_log.json
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "Auto scrape $(date -u +'%Y-%m-%d')" && git push)
