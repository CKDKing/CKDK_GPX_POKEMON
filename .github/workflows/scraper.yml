name: Pokemon Scraper

on:
  schedule:
    - cron: '0 1 * * *'   # 每天台灣時間早上 09:00 (UTC 01:00)
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write           # 允許寫入 repo（上傳圖片、更新 crawl_log.json）

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright pillow beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/3-Threads_Pokemon_Scraper.py
