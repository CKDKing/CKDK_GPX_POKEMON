name: PVPoke EN Daily Update

on:
  schedule:
    # UTC 00:00 = Taiwan 08:00 (UTC+8)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_download:
        description: 'Force re-download (init / manual run)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install playwright

      - name: Install Playwright + Chromium
        run: playwright install --with-deps chromium

      - name: Run PVP_DL_ENG
        id: pvp
        run: |
          ARGS="--no-git"
          if [ "${{ github.event.inputs.force_download }}" = "true" ]; then
            ARGS="$ARGS --force"
            echo "→ Force download mode"
          fi
          set +e
          python PVP_DL_ENG.py $ARGS
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit and push (only when downloaded)
        if: steps.pvp.outputs.exit_code == '10'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- PVPDataENG/
          git commit -m "data: PVPDataENG auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Summary
        run: |
          CODE="${{ steps.pvp.outputs.exit_code }}"
          if   [ "$CODE" = "10" ]; then echo "✓ Downloaded and committed."
          elif [ "$CODE" = "0"  ]; then echo "— No new version or check-only, skipped."
          else                          echo "✗ Script failed (exit $CODE)."; exit 1
          fi
